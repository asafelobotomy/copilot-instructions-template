name: Release Please

# Automated changelog generation and release creation via release-please.
# Creates a "release PR" that accumulates Conventional Commits, bumps version,
# and updates CHANGELOG.md. Merging the PR triggers a GitHub release.
#
# Triggered by workflow_run so it only fires AFTER all CI jobs pass on main.
# The release PR only bumps VERSION.md + CHANGELOG.md — no new code risk —
# so it is merged immediately without waiting for a second CI run.
# If branch protection blocks a direct merge, the step falls back to --auto.
#
# After a release is created, a stub MIGRATION.md entry is auto-committed so
# the next CI run does not fail the release-contracts check.
#
# Coexists with release-manual.yml — use one or the other, not both.

on:
  workflow_run:
    workflows: ["CI — Validate template"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge release PR
        if: steps.release.outputs.pr && !steps.release.outputs.release_created
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_number=${{ fromJSON(steps.release.outputs.pr).number }}
          if output=$(gh pr merge "$pr_number" \
            --repo ${{ github.repository }} \
            --squash 2>&1); then
            echo "$output"
          else
            echo "$output"
            # Branch protection requires CI on the PR itself — fall back to auto-merge.
            if grep -Fq 'Auto merge is not allowed for this repository' <<< "$output"; then
              echo '::warning::Repository auto-merge is disabled. Enable it in Settings → General or merge the release PR manually.'
            elif grep -qiE 'required status|protected branch|branch protection' <<< "$output"; then
              echo '::notice::Branch protection active. Falling back to --auto; PR will merge once PR checks pass.'
              gh pr merge "$pr_number" \
                --repo ${{ github.repository }} \
                --squash \
                --auto \
                || echo '::warning::Auto-merge failed. Merge the release PR manually.'
            else
              exit 1
            fi
          fi

      - name: Stub MIGRATION.md entry for new release
        if: steps.release.outputs.release_created == 'true'
        env:
          TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          # Pull the release commit that release-please just pushed
          git pull --ff-only
          bash scripts/stub-migration.sh "$TAG"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add MIGRATION.md
          git diff --cached --quiet \
            || git commit -m "docs: stub MIGRATION.md entry for ${TAG} [skip ci]"
          git push
