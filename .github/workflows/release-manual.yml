name: Auto-release on VERSION.md bump

# Fires when VERSION.md changes on main — creates a tag + release automatically.
# Changelog notes are extracted from the matching ## [x.y.z] section.
# If the tag already exists (re-push / hotfix), the job is a harmless no-op.
#
# DISABLED by default — release-please.yml is the active release strategy.
# To switch: uncomment the push trigger below and disable release-please.yml.
# See docs/RELEASE-AUTOMATION-GUIDE.md for trade-offs.

on:
  workflow_dispatch:  # manual-only while release-please is active
  # push:
  #   branches: [main]
  #   paths:
  #     - VERSION.md

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # full history needed to list existing tags

      - name: Read version
        id: ver
        run: echo "version=$(tr -d '[:space:]' < VERSION.md)" >> "$GITHUB_OUTPUT"

      - name: Check tag does not already exist
        id: tag_check
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          if git tag --list "$TAG" | grep -q .; then
            echo "already_exists=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Tag $TAG already exists — skipping"
          else
            echo "already_exists=false" >> "$GITHUB_OUTPUT"
            echo "🚀 Creating release $TAG"
          fi

      - name: Extract changelog notes
        if: steps.tag_check.outputs.already_exists == 'false'
        run: |
          V="${{ steps.ver.outputs.version }}"
          awk "/^## \[$V\]/{found=1; next} found && /^## \[/{exit} found{print}" \
            CHANGELOG.md > /tmp/release-notes.md
          echo "--- notes preview ---"
          cat /tmp/release-notes.md

      - name: Create GitHub release
        if: steps.tag_check.outputs.already_exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            --title "v${{ steps.ver.outputs.version }}" \
            --notes-file /tmp/release-notes.md \
            --target "${{ github.sha }}"
