# Vale prose linting configuration
# See https://vale.sh/docs/topics/config/ for full reference.

StylesPath = .github/vale/styles
MinAlertLevel = warning

# Packages to auto-download when "vale sync" is run.
# The vale-action in .github/workflows/vale.yml runs sync automatically.
# Add additional packages (e.g. Google, write-good) separated by commas.
Packages = Vale

# Use the built-in Vale style as a baseline.
# Add project-specific rules in .github/vale/styles/ as needed.
[*.md]
BasedOnStyles = Vale
